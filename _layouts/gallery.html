---
layout: page
# Masonry gallery with pagination
---

{% assign per_page = page.per_page | default: 20 %}
{% assign cols = page.columns | default: 2 %}
{% assign total = site.data.gallery | size %}

<div class="gallery-masonry" id="gallery-grid">
  {% for i in (1..cols) %}
    <div class="gallery-column" data-col="{{ i }}"></div>
  {% endfor %}
</div>

{% if total > per_page %}
<div class="gallery-load-more text-center mt-4 mb-2">
  <button id="gallery-more-btn" class="btn btn-outline-secondary btn-sm">
    加载更多
  </button>
  <span class="gallery-counter text-muted small ms-2">
    <span id="gallery-shown">0</span> / {{ total }}
  </span>
</div>
{% endif %}

<!-- Lightbox -->
<div class="gallery-lightbox" id="lb" onclick="closeLB()">
  <button class="gallery-lb-close" aria-label="关闭">&times;</button>
  <img id="lb-img" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="" onclick="event.stopPropagation()" />
</div>

<script>
(function() {
  var lb = document.getElementById('lb');
  var lbImg = document.getElementById('lb-img');
  window.openLB = function(s) { lbImg.src = s; lb.classList.add('on'); document.body.style.overflow = 'hidden'; };
  window.closeLB = function() { lb.classList.remove('on'); document.body.style.overflow = ''; };
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeLB(); });

  var allPhotos = [
    {% for photo in site.data.gallery %}
      { image: "{{ photo.image }}", title: "{{ photo.title | default: '照片' }}" }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  var cols = document.querySelectorAll('.gallery-column');
  var colCount = cols.length;
  var perPage = {{ per_page }};
  var shown = 0;
  var counter = document.getElementById('gallery-shown');
  var btn = document.getElementById('gallery-more-btn');

  function addPhotos(count) {
    var end = Math.min(shown + count, allPhotos.length);
    for (var i = shown; i < end; i++) {
      var div = document.createElement('div');
      div.className = 'gallery-item';
      div.onclick = (function(src) { return function() { openLB(src); }; })(allPhotos[i].image);
      var img = document.createElement('img');
      img.src = allPhotos[i].image;
      img.alt = allPhotos[i].title;
      img.loading = 'lazy';
      div.appendChild(img);
      cols[i % colCount].appendChild(div);
    }
    shown = end;
    if (counter) counter.textContent = shown;
    if (btn && shown >= allPhotos.length) btn.style.display = 'none';
  }

  // Initial load
  addPhotos(perPage);

  // Load more
  if (btn) {
    btn.addEventListener('click', function() { addPhotos(perPage); });
  }
})();
</script>
