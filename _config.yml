# Site Configuration

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-include-cache

lang: zh-CN
timezone: Asia/Shanghai

# Site Info
title: MickeyMiao
tagline: code is cheap, show me your prompt
description: >-
  MickeyMiao 的个人博客，记录技术学习、图形学笔记和生活感悟。
url: "https://blog.mickeymiao.cn"

github:
  username: WangSimiao2000

social:
  name: Wang Simiao
  email: mickeymiao2023@163.com
  links:
    - https://github.com/wangsimiao2000
    - https://steamcommunity.com/id/MickeyMiao/
    - https://space.bilibili.com/36913332

# SEO Verification
webmaster_verifications:
  google: "jDx4WsLTQPjOKEDz18-BywqYTrR3Kd2anexSUvXsB5A"
  bing: "AED17E5D4F90FD73F2F67459465E4A3C"

# Appearance
avatar: /assets/img/avatar/avatar.png
toc: true

# Comments (Giscus)
comments:
  provider: giscus
  giscus:
    repo: WangSimiao2000/wangsimiao2000.github.io
    repo_id: R_kgDONW4tGQ
    category: General
    category_id: DIC_kwDONW4tGc4ClVF_
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: zh-CN
    reactions_enabled: 1

# PWA
pwa:
  enabled: true
  cache:
    enabled: true

paginate: 10

# The base URL of your site
baseurl: ""

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true # Enable comments in posts.
      toc: true # Display TOC column in posts.
      # DO NOT modify the following parameter unless you are confident enough
      # to update the code of all other post links in this project.
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/

sass:
  sass_dir: _sass
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# Cloudflare R2 Gallery Settings
# 配置你的 R2 公开访问域名和相册目录前缀
r2_gallery:
  # R2 公开访问域名（自定义域名或 R2.dev 公开域名），不要以 / 结尾
  public_url: "https://pub-7bf80453844047b1bd82b30ec1edd37e.r2.dev"
  # R2 bucket 中相册图片的前缀路径，留空表示根目录
  prefix: ""

exclude:
  - "*.gem"
  - "*.gemspec"
  - README.md
  - LICENSE
  - _javascript
  - rollup.config.js
  - package.json
  - package-lock.json
  - node_modules

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
